---
- name: Instalar y configurar Apache Tomcat 10.1.24
  hosts: tomcat_servers
  become: yes

  vars:
    tomcat_version: "10.1.24"
    tomcat_install_dir: "/opt"
    tomcat_home: "/opt/apache-tomcat-{{ tomcat_version }}"
    tomcat_symlink: "/opt/tomcat"
    tomcat_user: "tomcat"
    tomcat_group: "tomcat"
    java_package: "openjdk-17-jdk"
    tomcat_url: "https://downloads.apache.org/tomcat/tomcat-10/v{{ tomcat_version }}/bin/apache-tomcat-{{ tomcat_version }}.tar.gz"

  tasks:
    - name: 1 - Actualizar cache de paquetes apt
      apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: 2 - Instalar OpenJDK 17
      apt:
        name: "{{ java_package }}"
        state: present

    - name: 3 - Crear grupo tomcat
      group:
        name: "{{ tomcat_group }}"
        state: present

    - name: 4 - Crear usuario tomcat
      user:
        name: "{{ tomcat_user }}"
        group: "{{ tomcat_group }}"
        home: "{{ tomcat_symlink }}"
        shell: /bin/false
        system: yes
        create_home: no

    - name: 5 - Descargar Apache Tomcat {{ tomcat_version }}
      get_url:
        url: "{{ tomcat_url }}"
        dest: "/tmp/apache-tomcat-{{ tomcat_version }}.tar.gz"
        mode: '0644'

    - name: 6 - Extraer Tomcat en /opt
      unarchive:
        src: "/tmp/apache-tomcat-{{ tomcat_version }}.tar.gz"
        dest: "{{ tomcat_install_dir }}"
        remote_src: yes
        creates: "{{ tomcat_home }}"

    - name: 7 - Crear symlink /opt/tomcat -> /opt/apache-tomcat-{{ tomcat_version }}
      file:
        src: "{{ tomcat_home }}"
        dest: "{{ tomcat_symlink }}"
        state: link
        force: yes

    - name: 8a - Establecer permisos en directorio bin
      file:
        path: "{{ tomcat_symlink }}/bin"
        owner: "{{ tomcat_user }}"
        group: "{{ tomcat_group }}"
        recurse: yes

    - name: 8b - Establecer permisos en directorio webapps
      file:
        path: "{{ tomcat_symlink }}/webapps"
        owner: "{{ tomcat_user }}"
        group: "{{ tomcat_group }}"
        recurse: yes

    - name: 9 - Crear archivo de servicio systemd para Tomcat
      copy:
        dest: /etc/systemd/system/tomcat.service
        content: |
          [Unit]
          Description=Apache Tomcat 10 Web Application Server
          After=network.target

          [Service]
          Type=forking
          User={{ tomcat_user }}
          Group={{ tomcat_group }}
          Environment="JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64"
          Environment="CATALINA_PID={{ tomcat_symlink }}/temp/tomcat.pid"
          Environment="CATALINA_HOME={{ tomcat_symlink }}"
          Environment="CATALINA_BASE={{ tomcat_symlink }}"
          Environment="CATALINA_OPTS=-Xms512M -Xmx1024M -server -XX:+UseParallelGC"
          ExecStart={{ tomcat_symlink }}/bin/startup.sh
          ExecStop={{ tomcat_symlink }}/bin/shutdown.sh
          Restart=on-failure

          [Install]
          WantedBy=multi-user.target
        mode: '0644'

    - name: 10 - Recargar daemon de systemd
      systemd:
        daemon_reload: yes

    - name: 11 - Habilitar e iniciar servicio Tomcat
      systemd:
        name: tomcat
        state: started
        enabled: yes

    - name: 12 - Esperar que Tomcat escuche en puerto 8080
      wait_for:
        host: localhost
        port: 8080
        delay: 5
        timeout: 60

    - name: 13 - Mostrar URL de acceso a Tomcat
      debug:
        msg: "Tomcat {{ tomcat_version }} disponible en http://{{ ansible_host }}:8080"
