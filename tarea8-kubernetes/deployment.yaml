# Tarea 8 - Kubernetes | Alumno: JJLR | UAX DevOps 2026
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tarea8-deployment-jjlr
  namespace: default
  labels:
    app: tarea8-jjlr
    alumno: jjlr
    tarea: tarea8-kubernetes
spec:
  replicas: 2
  selector:
    matchLabels:
      app: tarea8-jjlr
  template:
    metadata:
      labels:
        app: tarea8-jjlr
        alumno: jjlr
    spec:
      containers:
      - name: flask-app
        image: docker.io/library/tarea7-jjlr:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 5000
        resources:
          requests:
            memory: 64Mi
            cpu: 50m
          limits:
            memory: 128Mi
            cpu: 200m
        livenessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 10
          periodSeconds: 15
        readinessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 5
          periodSeconds: 10
