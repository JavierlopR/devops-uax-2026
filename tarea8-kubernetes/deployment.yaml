apiVersion: apps/v1
kind: Deployment
metadata:
  name: tarea8-deployment-jjlr
  labels:
    app: tarea8-jjlr
    alumno: jjlr
    curso: devops-uax-2026
spec:
  replicas: 2
  selector:
    matchLabels:
      app: tarea8-jjlr
  template:
    metadata:
      labels:
        app: tarea8-jjlr
        alumno: jjlr
    spec:
      containers:
      - name: tarea8-container-jjlr
        image: tarea7-jjlr:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 5000
          name: http
        resources:
          requests:
            memory: "64Mi"
            cpu: "100m"
          limits:
            memory: "128Mi"
            cpu: "250m"
        livenessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 10
          periodSeconds: 30
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 5
          periodSeconds: 10
          failureThreshold: 3
